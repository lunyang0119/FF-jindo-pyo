<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Final Fantasy 진도 체크판</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Cinzel:wght@400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Gowun+Batang:wght@400;700&family=JetBrains+Mono:wght@400;500;700&family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    /* 양피지 저널 — 기본 테마 */
    --bg: #efe6d2;
    --paper: #f7efdd;
    --paper-2: #fbf5e6;
    --ink: #2a1d10;
    --ink-soft: #5a4a36;
    --ink-mute: #907a5a;
    --line: #c9b890;
    --line-soft: #d9cba8;
    --accent: #8a1c1c;      /* 인장 레드 */
    --accent-2: #c2872a;    /* 금박 */
    --accent-soft: #b24848;
    --stamp: #8a1c1c;
    --shadow: 0 1px 0 rgba(90,70,40,0.06), 0 8px 24px -12px rgba(90,70,40,0.2);
  }
  html[data-theme="midnight"] {
    --bg: #0e1018;
    --paper: #161925;
    --paper-2: #1d2130;
    --ink: #e8e3d4;
    --ink-soft: #b5ac96;
    --ink-mute: #6e6857;
    --line: #2c3045;
    --line-soft: #23273a;
    --accent: #d4a944;
    --accent-2: #7ba6d9;
    --accent-soft: #e6c06a;
    --stamp: #d4a944;
    --shadow: 0 1px 0 rgba(0,0,0,0.3), 0 12px 32px -16px rgba(0,0,0,0.6);
  }
  html[data-theme="minimal"] {
    --bg: #f5f5f3;
    --paper: #ffffff;
    --paper-2: #fafaf8;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-mute: #8a8a8a;
    --line: #e4e4e0;
    --line-soft: #eeeeea;
    --accent: #1a1a1a;
    --accent-2: #8a1c1c;
    --accent-soft: #3a3a3a;
    --stamp: #1a1a1a;
    --shadow: 0 1px 0 rgba(0,0,0,0.02), 0 4px 12px -6px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "kern", "liga";
  }

  /* 종이 질감 — 테마별 교체 */
  .page-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(138,28,28,0.05), transparent 60%),
      radial-gradient(ellipse 60% 40% at 0% 100%, rgba(194,135,42,0.05), transparent 70%);
  }
  html[data-theme="midnight"] .page-bg {
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212,169,68,0.06), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(123,166,217,0.05), transparent 70%);
  }
  html[data-theme="minimal"] .page-bg { background-image: none; }

  .wrap { position: relative; z-index: 1; max-width: 1480px; margin: 0 auto; }

  /* ==== 헤더 ==== */
  .hdr {
    padding: 44px 32px 28px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--paper-2), var(--paper));
    position: relative;
  }
  .hdr-inner { display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px; align-items: center; }
  .hdr-left, .hdr-right { min-width: 0; }
  .hdr-right { text-align: right; }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--ink-mute);
    display: flex; align-items: center; gap: 10px;
  }
  .hdr-right .eyebrow { justify-content: flex-end; }
  .eyebrow .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); display: inline-block; }

  .ttl {
    font-family: 'Cinzel', serif; font-weight: 900;
    font-size: clamp(28px, 4vw, 44px);
    letter-spacing: 0.08em;
    color: var(--ink);
    line-height: 1.05;
    text-align: center;
  }
  .ttl .amp { color: var(--accent); font-weight: var(--ko-weight, 900); font-family: var(--ko-font, 'Noto Serif KR'), serif; letter-spacing: -0.01em; }
  .twt-line { text-align: center; margin-top: 10px; font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: 0.04em; }

  .sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 8px;
    cursor: text;
  }
  .sub .orn { color: var(--accent); opacity: 0.7; margin: 0 10px; letter-spacing: 4px; }
  .sub input {
    font-family: inherit; font-style: italic; font-size: 18px; color: var(--ink);
    background: transparent; border: none; border-bottom: 1px dashed var(--line);
    padding: 2px 8px; width: min(420px, 70vw); text-align: center; outline: none;
  }
  .sub input:focus { border-bottom-color: var(--accent); }

  /* 진행 카드 — 헤더 메인 */
  .progress-card {
    margin-top: 28px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 22px 28px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 32px;
    align-items: center;
    box-shadow: var(--shadow);
    position: relative;
  }
  .progress-card::before, .progress-card::after {
    content: ""; position: absolute; width: 10px; height: 10px;
    border: 1px solid var(--ink-mute); opacity: 0.4;
  }
  .progress-card::before { top: 6px; left: 6px; border-right: none; border-bottom: none; }
  .progress-card::after  { bottom: 6px; right: 6px; border-left: none; border-top: none; }

  .stat-big {
    display: flex; align-items: baseline; gap: 4px;
    font-family: 'Cinzel', serif; font-weight: 700;
    color: var(--ink);
  }
  .stat-big .n { font-size: 56px; line-height: 1; letter-spacing: -0.02em; }
  .stat-big .sep { font-size: 32px; color: var(--ink-mute); margin: 0 4px; }
  .stat-big .d { font-size: 28px; color: var(--ink-soft); }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-mute); margin-top: 4px; }

  .pbar-col { min-width: 0; }
  .pbar-top {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-mute); letter-spacing: 0.1em; margin-bottom: 8px;
  }
  .pbar-top .pct { font-family: 'Cinzel', serif; font-weight: 700; font-size: 22px; color: var(--accent); letter-spacing: 0; }
  .pbar {
    height: 8px; background: var(--line-soft); border-radius: 0;
    overflow: hidden; position: relative;
    border: 1px solid var(--line);
  }
  .pfill {
    height: 100%;
    background:
      repeating-linear-gradient(135deg, var(--accent) 0 6px, var(--accent-soft) 6px 12px);
    transition: width 0.5s cubic-bezier(.2,.7,.2,1);
  }
  .pbar-ticks {
    display: flex; justify-content: space-between;
    margin-top: 6px; font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--ink-mute); letter-spacing: 0.1em;
  }

  /* 씰 (완성 퍼센트 위의 작은 배지) */
  .seal {
    width: 92px; height: 92px; border-radius: 50%;
    background: var(--paper);
    border: 2px solid var(--accent);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
    box-shadow: inset 0 0 0 4px var(--paper), inset 0 0 0 5px var(--accent);
  }
  .seal-pct {
    font-family: 'Cinzel', serif; font-weight: 900; font-size: 22px;
    color: var(--accent); letter-spacing: 0;
  }
  .seal-lbl {
    font-family: 'JetBrains Mono', monospace; font-size: 7.5px;
    color: var(--accent); letter-spacing: 0.22em; text-transform: uppercase;
    margin-top: 1px;
  }
  .seal-star {
    position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
    width: 10px; height: 10px; background: var(--accent);
    clip-path: polygon(50% 0, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  }

  /* 액션 바 */
  .actions {
    display: flex; gap: 10px; justify-content: center; align-items: center;
    margin-top: 20px; flex-wrap: wrap;
  }
  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 11px 22px; cursor: pointer;
    border: 1px solid var(--line); background: var(--paper-2); color: var(--ink-soft);
    border-radius: 1px;
    transition: all 0.15s ease;
  }
  .btn:hover { background: var(--paper); border-color: var(--ink-mute); color: var(--ink); }
  .btn-primary {
    background: var(--ink); border-color: var(--ink); color: var(--paper);
    font-weight: 700;
  }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:disabled { opacity: 0.5; cursor: wait; }
  .btn-danger:hover { background: var(--paper); border-color: var(--accent); color: var(--accent); }

  .twt {
    display: inline-flex; align-items: center; gap: 0;
    border: 1px solid var(--line); background: var(--paper-2);
    border-radius: 1px; overflow: hidden;
  }
  .twt-at {
    padding: 0 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-mute); border-right: 1px solid var(--line);
    background: var(--paper); align-self: stretch; display: flex; align-items: center;
    white-space: nowrap;
  }
  .twt input {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink);
    background: transparent; border: none; padding: 10px 12px; width: 180px; outline: none;
    letter-spacing: 0.05em;
  }

  /* ==== 그리드 ==== */
  .grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px;
    padding: 32px 32px 60px;
    position: relative;
  }
  /* 칼럼 구분선 */
  .grid::before {
    content: ""; position: absolute;
    top: 32px; bottom: 60px; left: 25%; right: 25%;
    background-image:
      linear-gradient(var(--line-soft), var(--line-soft)),
      linear-gradient(var(--line-soft), var(--line-soft));
    background-size: 1px 100%;
    background-position: 0 0, 100% 0;
    background-repeat: no-repeat;
    pointer-events: none;
  }

  @media (max-width: 1100px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 24px 20px 40px; }
    .grid::before { left: 50%; right: auto; width: 1px; background: var(--line-soft); }
    .hdr-inner { grid-template-columns: 1fr; }
    .hdr-left, .hdr-right { text-align: center; }
    .hdr-right .eyebrow { justify-content: center; }
    .progress-card { grid-template-columns: 1fr; gap: 18px; text-align: center; }
    .stat-big, .progress-card .seal { justify-self: center; }
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .grid::before { display: none; }
    .hdr { padding: 28px 16px 20px; }
    .progress-card { padding: 18px 18px; }
    .stat-big .n { font-size: 44px; }
  }

  /* ==== 시리즈 카드 ==== */
  .ser {
    margin-bottom: 26px;
    position: relative;
  }

  /* 시리즈 헤더: 번호 + 타이틀 + 진척 게이지 */
  .ser-head {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 14px;
    align-items: center;
    padding: 10px 4px 12px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--line);
    transition: all 0.15s;
  }
  .ser-head:hover { border-bottom-color: var(--accent); }

  .ser-num {
    font-family: 'Cinzel', serif; font-weight: 900;
    font-size: 44px; line-height: 0.9;
    color: var(--ser-c, var(--ink));
    letter-spacing: 0.02em;
    min-width: 56px; text-align: center;
    transition: all 0.2s;
    font-feature-settings: "lnum";
  }
  .ser-num.small { font-size: 22px; letter-spacing: 0.1em; }
  .ser-meta { min-width: 0; }
  .ser-title {
    font-family: 'Cinzel', serif; font-weight: 600;
    font-size: 11px; letter-spacing: 0.2em;
    color: var(--ink-soft);
    line-height: 1.2;
  }
  .ser-sub {
    display: flex; align-items: baseline; gap: 8px;
    margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.15em;
    color: var(--ink-mute); text-transform: uppercase;
  }
  .ser-year { color: var(--ser-c, var(--ink-mute)); font-weight: 500; }
  .ser-count {
    margin-left: auto;
    font-family: 'Cinzel', serif; font-weight: 700;
    font-size: 12px;
    color: var(--ink-mute);
    letter-spacing: 0;
  }
  .ser-count b { color: var(--ser-c, var(--ink)); font-weight: 900; font-size: 14px; }

  /* 미니 진척 라인 */
  .ser-gauge {
    height: 2px; background: var(--line-soft);
    margin-top: 8px;
    position: relative;
  }
  .ser-gauge-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    background: var(--ser-c, var(--accent));
    transition: width 0.4s cubic-bezier(.2,.7,.2,1);
  }

  /* 완료 상태 */
  .ser.done .ser-num {
    color: var(--accent);
    text-shadow: 0 0 1px var(--accent);
  }
  .ser.done .ser-head {
    border-bottom-color: var(--accent);
  }
  .ser-seal-mark {
    display: none;
    font-family: 'Cinzel', serif; font-weight: 900;
    color: var(--accent); font-size: 11px;
    letter-spacing: 0.2em;
    padding: 2px 8px;
    border: 1px solid var(--accent);
    margin-left: 8px;
  }
  .ser.done .ser-seal-mark { display: inline-block; }

  /* ==== 로고 이미지 모드 (logos/xxx.webp 있을 때) ==== */
  .logo-img {
    max-width: 100%; max-height: 48px;
    object-fit: contain;
    display: block;
    filter: var(--logo-filter, none);
  }
  html[data-theme="midnight"] .logo-img { filter: brightness(0) invert(1) opacity(0.9); }

  /* ==== 게임 리스트 ==== */
  .games { padding: 10px 4px 0 4px; }
  .gi {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 7px 6px;
    border-radius: 1px;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    position: relative;
  }
  .gi:hover { background: var(--paper-2); }
  .gi:hover .gi-num { color: var(--ser-c, var(--ink-soft)); }

  .gi-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; font-weight: 500;
    color: var(--ink-mute);
    min-width: 22px; padding-top: 4px;
    letter-spacing: 0.08em;
    transition: color 0.12s;
  }

  .cb {
    width: 16px; height: 16px;
    border: 1.5px solid var(--line); background: var(--paper);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    margin-top: 3px;
    position: relative;
  }
  .cb::after {
    content: ""; position: absolute; inset: -4px;
    border: 1px dashed transparent;
    transition: border-color 0.15s;
  }
  .gi:hover .cb { border-color: var(--ser-c, var(--ink-mute)); }
  .cb.on {
    background: var(--ser-c, var(--accent));
    border-color: var(--ser-c, var(--accent));
  }
  .cb.on::after { border-color: var(--ser-c, var(--accent)); opacity: 0.3; }
  .cb svg { width: 10px; height: 10px; stroke: #fff; }

  .gn {
    font-size: 13px; font-weight: 400; color: var(--ink-mute);
    line-height: 1.35;
    transition: all 0.12s;
    word-break: keep-all;
    padding-top: 1px;
  }
  .gi:hover .gn { color: var(--ink-soft); }
  .gn.on { color: var(--ink); font-weight: 500; }
  .gn.on::before {
    content: ""; display: inline-block; width: 3px; height: 3px;
    background: var(--ser-c, var(--accent)); border-radius: 50%;
    margin-right: 6px; vertical-align: middle; margin-bottom: 2px;
  }

  /* ==== 푸터 ==== */
  .ft {
    text-align: center;
    padding: 28px 16px 40px;
    border-top: 1px solid var(--line);
    background: var(--paper-2);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ink-mute);
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  .ft .orn { color: var(--accent); margin: 0 10px; opacity: 0.5; }

  /* Tweaks 버튼 트리거는 호스트에서 처리 */
</style>
</head>

<div class="page-bg"></div>
<div id="app"></div>

<script type="text/babel">const { useState, useEffect, useCallback, useRef, Fragment } = React;

const LOGO_DIR = "logos/";
const LOGO_EXT = ".webp";

// 캔버스용 로고 이미지 프리로드 (logos/ 폴더 참조)
function loadLogoImg(id) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = LOGO_DIR + id + LOGO_EXT;
  });
}

function load(k,d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } }
function saveLS(k,v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

// 하드코딩 — 푸터에 표시
const MADE_BY = "@isekaiseaweed";
const SITE_URL = location.origin + location.pathname;

// 한글 제목 폰트 후보
const KO_FONTS = {
  notoSerif:  { family: '"Noto Serif KR", serif',    weight: 900, sizeAdj: 1.0  },
  gowun:      { family: '"Gowun Batang", serif',     weight: 700, sizeAdj: 1.0  },
  myeongjo:   { family: '"Nanum Myeongjo", serif',   weight: 800, sizeAdj: 1.05 },
  blackHan:   { family: '"Black Han Sans", sans-serif', weight: 400, sizeAdj: 0.95 },
};

function App() {
  // (Tweaks removed) — values are now hardcoded below
  const [played, setPlayed] = useState(() => load("ff-played", {}));
  const [saving, setSaving] = useState(false);
  const [subtitle, setSubtitle] = useState(() => load("ff-sub", "마지막헛것어디까지해봤니"));
  const [editingSub, setEditingSub] = useState(false);
  const [logoLoaded, setLogoLoaded] = useState({});
  const [twitterId, setTwitterId] = useState(() => load("ff-twt", ""));
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    document.documentElement.dataset.theme = "parchment";
    const f = KO_FONTS.notoSerif;
    document.documentElement.style.setProperty('--ko-font', f.family);
    document.documentElement.style.setProperty('--ko-weight', f.weight);
  }, []);
  useEffect(() => { saveLS("ff-played", played); }, [played]);
  useEffect(() => { saveLS("ff-twt", twitterId); }, [twitterId]);

  const copyUrl = () => {
    navigator.clipboard.writeText(SITE_URL).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    }).catch(() => {});
  };

  useEffect(() => {
    // 페이지 로드 시 로고 프리로드 (crossOrigin 설정으로 canvas 오염 방지)
    SERIES.forEach(s => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => setLogoLoaded(prev => ({...prev, [s.id]: img}));
      img.onerror = () => {};
      img.src = LOGO_DIR + s.id + LOGO_EXT;
    });
  }, []);

  const toggle = (id) => setPlayed(p => ({...p, [id]: !p[id]}));
  const toggleSeries = (s) => {
    const all = s.games.every(g => played[g.id]);
    const u = {};
    s.games.forEach(g => { u[g.id] = !all; });
    setPlayed(p => ({...p, ...u}));
  };

  const playedCount = Object.values(played).filter(Boolean).length;
  const pct = Math.round((playedCount / TOTAL_GAMES) * 100);

  const saveSub = () => { setEditingSub(false); saveLS("ff-sub", subtitle); };

  const exportImage = useCallback(async () => {
    setSaving(true);
    try {
    // 폰트 로딩 (타임아웃 1.5초)
    const withTimeout = (p, ms=1500) => Promise.race([p, new Promise(r=>setTimeout(r,ms))]);
    const koFont = KO_FONTS.notoSerif;
    const koSize = Math.round(60 * koFont.sizeAdj);
    await withTimeout(document.fonts.load('900 60px "Cinzel"')).catch(()=>{});
    await withTimeout(document.fonts.load(`${koFont.weight} ${koSize}px ${koFont.family}`)).catch(()=>{});
    await withTimeout(document.fonts.load('600 13px "Cinzel"')).catch(()=>{});
    await withTimeout(document.fonts.load('400 16px "Noto Sans KR"')).catch(()=>{});
    await withTimeout(document.fonts.load('500 17px "Noto Sans KR"')).catch(()=>{});
    await withTimeout(document.fonts.load('400 22px "Cormorant Garamond"')).catch(()=>{});
    await withTimeout(document.fonts.load('500 16px "JetBrains Mono"')).catch(()=>{});
    await withTimeout(document.fonts.load('700 22px "JetBrains Mono"')).catch(()=>{});
    await new Promise(r => setTimeout(r, 200));

    // 로고 이미지 로드 (export 시점에 새로 await — useCallback stale closure 회피 + 빠진 로드 보정)
    const loadImg = (src) => new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => resolve(img);
      img.onerror = () => {
        // crossOrigin 실패 시 같은 origin으로 폴백
        const img2 = new Image();
        img2.onload = () => resolve(img2);
        img2.onerror = () => resolve(null);
        img2.src = src;
      };
      img.src = src;
    });
    const logoImgs = {};
    await Promise.all(SERIES.map(async s => {
      const img = await loadImg(LOGO_DIR + s.id + LOGO_EXT);
      if (img) logoImgs[s.id] = img;
    }));

    // 테마 팔레트
    const themeVars = getComputedStyle(document.documentElement);
    const gv = (k, fb) => themeVars.getPropertyValue(k).trim() || fb;
    const palette = {
      bg:       gv('--paper',     '#f7efdd'),
      bg2:      gv('--paper-2',   '#fbf5e6'),
      ink:      gv('--ink',       '#2a1d10'),
      inkSoft:  gv('--ink-soft',  '#5a4a36'),
      inkMute:  gv('--ink-mute',  '#907a5a'),
      line:     gv('--line',      '#c9b890'),
      lineSoft: gv('--line-soft', '#d9cba8'),
      accent:   gv('--accent',    '#8a1c1c'),
    };

    // 트위터 가로형: W=2400, 6컬럼 → 약 2:1 비율 (타임라인에서 잘리지 않음)
    const S=2, W=2400, padX=52, colGap=30;
    const NCOLS = EXPORT_LAYOUT.length;
    const colW = (W - padX*2 - colGap*(NCOLS-1)) / NCOLS;
    // 헤더: 타이틀(64) + 부제(40) + 트위터(36) + 진행바박스(72) + 여백
    const hasTwt = !!twitterId.trim();
    const padTop = 64 + 40 + (hasTwt ? 36 : 0) + 76 + 30;
    const padBot = 96;
    const headH = 90, itemH = 36, secGap = 22;

    const colHs = EXPORT_LAYOUT.map(ids =>
      ids.map(id => SERIES_BY_ID[id])
         .reduce((h, s) => h + headH + s.games.length * itemH + secGap, 0)
    );
    const H = padTop + Math.max(...colHs) + padBot;

    const cv = document.createElement("canvas");
    cv.width = W*S; cv.height = H*S;
    const cx = cv.getContext("2d");
    cx.scale(S, S);

    // 헬퍼: textBaseline을 middle로 고정해서 사용
    const txt = (text, x, y, opts = {}) => {
      if (opts.align)  cx.textAlign    = opts.align;
      if (opts.color)  cx.fillStyle    = opts.color;
      if (opts.font)   cx.font         = opts.font;
      cx.textBaseline = "middle";
      cx.fillText(text, x, y);
    };

    // ── 배경 ──
    cx.fillStyle = palette.bg; cx.fillRect(0, 0, W, H);
    cx.fillStyle = palette.inkMute + "08";
    for (let i = 0; i < 300; i++) cx.fillRect(Math.random()*W, Math.random()*H, 1, 1);

    // ── 타이틀 ── (measureText로 두 부분을 이어 붙임)
    const titleY = 56;
    cx.textBaseline = "middle";
    cx.textAlign    = "center";
    cx.font = '900 60px "Cinzel", serif';
    const ffW = cx.measureText("FINAL FANTASY ").width;
    const koTitleFont = `${koFont.weight} ${koSize}px ${koFont.family}`;
    cx.font = koTitleFont;
    const jdW = cx.measureText("진도").width;
    const titleTotalW = ffW + jdW;
    const titleStartX = W/2 - titleTotalW/2;

    cx.textAlign = "left";
    cx.font = '900 60px "Cinzel", serif';
    txt("FINAL FANTASY ", titleStartX, titleY, { color: palette.ink });
    cx.font = koTitleFont;
    txt("진도", titleStartX + ffW, titleY, { color: palette.accent });

    // 부제
    txt("~ " + subtitle + " ~", W/2, titleY + 54, {
      align: "center", color: palette.inkSoft,
      font: 'italic 400 22px "Cormorant Garamond", serif'
    });

    // 트위터 ID (부제 아래)
    let cursorY = titleY + 54 + 28;
    if (hasTwt) {
      txt("@" + twitterId.trim(), W/2, cursorY + 14,
        { align:"center", color: palette.ink, font: '700 22px "JetBrains Mono", monospace' });
      cursorY += 36;
    }

    // ── 진행률 박스 ──
    const boxX = padX, boxY = cursorY + 8, boxW = W - padX*2, boxH = 64;
    cx.fillStyle = palette.bg2;
    cx.strokeStyle = palette.line; cx.lineWidth = 1.4;
    cx.fillRect(boxX, boxY, boxW, boxH);
    cx.strokeRect(boxX, boxY, boxW, boxH);

    const boxMidY = boxY + boxH/2;
    txt(pct + "%", boxX + 28, boxMidY,
      { align:"left", color: palette.accent, font: '900 40px "Cinzel", serif' });
    txt(playedCount + " / " + TOTAL_GAMES + " COMPLETED", boxX + 158, boxMidY - 1,
      { align:"left", color: palette.inkSoft, font: '500 16px "JetBrains Mono", monospace' });

    // 진행률 바 (트위터 자리 없어서 전체 폭 사용)
    const barX = boxX + 460, barY = boxMidY - 7, barW = boxW - 480 - 24, barH = 14;
    // 옅은 트랙
    cx.fillStyle = palette.lineSoft; cx.globalAlpha = 0.6;
    cx.fillRect(barX, barY, barW, barH);
    cx.globalAlpha = 1;
    // 25/50/75 눈금
    cx.fillStyle = palette.line;
    [0.25, 0.5, 0.75].forEach(t => {
      cx.fillRect(barX + barW*t - 0.5, barY - 3, 1, barH + 6);
    });
    if (playedCount > 0) {
      cx.fillStyle = palette.accent;
      cx.fillRect(barX, barY, Math.max((playedCount/TOTAL_GAMES)*barW, 6), barH);
    }
    // 바 외곽 라인
    cx.strokeStyle = palette.line; cx.lineWidth = 1;
    cx.strokeRect(barX, barY, barW, barH);

    // ── 칼럼 구분선 ──
    cx.strokeStyle = palette.lineSoft; cx.lineWidth = 1;
    for (let i = 1; i < NCOLS; i++) {
      const lx = padX + i*(colW+colGap) - colGap/2;
      cx.beginPath(); cx.moveTo(lx, padTop-10); cx.lineTo(lx, H-padBot+10); cx.stroke();
    }

    // ── 시리즈 ──
    for (let c = 0; c < NCOLS; c++) {
      const ss = EXPORT_LAYOUT[c].map(id => SERIES_BY_ID[id]);
      const x = padX + c*(colW+colGap);
      let y = padTop;

      for (const s of ss) {
        const clr = LC[s.id] || palette.ink;
        const doneN = s.games.filter(g => played[g.id]).length;
        const allDone = doneN === s.games.length;
        const hdrColor = allDone ? palette.accent : clr;
        const headMidY = y + headH/2;
        const hasLogo = !!logoImgs[s.id];
        const isRoman = s.num && /^[IVX]+$/.test(s.num);

        // (A) 로만 숫자 + 로고 옆에 배치 (메인 시리즈 — 로고 있을 때)
        if (hasLogo && isRoman) {
          const numText = s.num;
          const numFontSize = numText.length <= 2 ? 56 : numText.length <= 4 ? 44 : 34;
          const numFont = `900 ${numFontSize}px "Cinzel", serif`;
          cx.font = numFont;
          const numW = cx.measureText(numText).width;
          // 왼쪽: 큰 로만 숫자
          txt(numText, x + 8, headMidY,
            { align:"left", color: hdrColor, font: numFont });
          // 오른쪽: 로고 (숫자 옆 공간을 채움)
          const img = logoImgs[s.id];
          const logoX0 = x + 8 + numW + 14;
          const maxW = (x + colW) - logoX0 - 4;
          const maxH = headH - 20;
          const ratio = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight);
          const dw = img.naturalWidth * ratio, dh = img.naturalHeight * ratio;
          cx.drawImage(img, logoX0, headMidY - dh/2, dw, dh);

        // (B) 로만 없음 + 로고 있음 (Tactics/WoFF/SoP/Theatrhythm/Type-0)
        //     → 약어(FT, WF, SP, TH, T0) 왼쪽 + 로고 가운데 정렬
        } else if (hasLogo) {
          const abbr = s.numText || "FF";
          const abbrFontSize = abbr.length <= 2 ? 42 : 32;
          const abbrFont = `900 ${abbrFontSize}px "Cinzel", serif`;
          cx.font = abbrFont;
          const abbrW = cx.measureText(abbr).width;
          txt(abbr, x + 8, headMidY,
            { align:"left", color: hdrColor, font: abbrFont });

          // 로고: 남은 공간(약어 오른쪽 ~ 칼럼 끝)의 가운데에 정렬
          const img = logoImgs[s.id];
          const regionX = x + 8 + abbrW + 14;
          const regionW = (x + colW) - regionX - 4;
          const maxH = headH - 18;
          const ratio = Math.min(regionW / img.naturalWidth, maxH / img.naturalHeight);
          const dw = img.naturalWidth * ratio, dh = img.naturalHeight * ratio;
          cx.drawImage(img, regionX + (regionW - dw)/2, headMidY - dh/2, dw, dh);

        // (C) 로고 없음 — 기존 텍스트 폴백 (로만 + FINAL FANTASY + 연도)
        } else {
          const numText = isRoman ? s.num : (s.numText || "FF");
          const numFontSize = isRoman
            ? (s.num.length <= 2 ? 56 : s.num.length <= 4 ? 44 : 34)
            : 42;
          const numFont = `900 ${numFontSize}px "Cinzel", serif`;
          cx.font = numFont;
          const numW = cx.measureText(numText).width;
          txt(numText, x + 8, headMidY,
            { align:"left", color: hdrColor, font: numFont });

          const metaX = x + 8 + numW + 14;
          txt(s.title, metaX, headMidY - 14,
            { align:"left", color: palette.inkSoft, font: '600 13px "Cinzel", serif' });
          const yearTxt = s.year ? s.year + "  ·  " : "";
          txt(yearTxt + doneN + "/" + s.games.length + (allDone ? "  ·  ✓" : ""),
            metaX, headMidY + 10,
            { align:"left", color: palette.inkMute, font: '500 12px "JetBrains Mono", monospace' });
        }

        // 하단선 + 미니 게이지
        const lineY = y + headH - 2;
        cx.strokeStyle = allDone ? palette.accent : palette.line; cx.lineWidth = 1.2;
        cx.beginPath(); cx.moveTo(x, lineY); cx.lineTo(x+colW, lineY); cx.stroke();
        if (doneN > 0) {
          cx.strokeStyle = hdrColor; cx.lineWidth = 2.5;
          cx.beginPath(); cx.moveTo(x, lineY); cx.lineTo(x + (doneN/s.games.length)*colW, lineY); cx.stroke();
        }
        y += headH + 6;

        // 게임 목록
        for (let idx = 0; idx < s.games.length; idx++) {
          const g = s.games[idx];
          const ck = !!played[g.id];
          const rowMidY = y + itemH/2;
          const cbS = 18;
          const cbX = x + 34, cbY = rowMidY - cbS/2;

          // 번호
          txt(String(idx+1).padStart(2,'0'), x + 6, rowMidY,
            { align:"left", color: palette.inkMute, font: '500 11px "JetBrains Mono", monospace' });

          // 체크박스
          if (ck) {
            cx.fillStyle = clr; cx.fillRect(cbX, cbY, cbS, cbS);
            cx.strokeStyle = "#fff"; cx.lineWidth = 2.4;
            cx.lineCap = "round"; cx.lineJoin = "round";
            cx.beginPath();
            cx.moveTo(cbX+3.5, cbY+9); cx.lineTo(cbX+7.5, cbY+13); cx.lineTo(cbX+14.5, cbY+5);
            cx.stroke();
          } else {
            cx.strokeStyle = palette.line; cx.lineWidth = 1.5;
            cx.strokeRect(cbX, cbY, cbS, cbS);
          }

          // 이름 (middle baseline)
          txt(g.name, cbX + cbS + 10, rowMidY,
            {
              align: "left",
              color: ck ? palette.ink : palette.inkMute,
              font:  ck ? '500 17px "Noto Sans KR", sans-serif'
                        : '400 16px "Noto Sans KR", sans-serif'
            });
          y += itemH;
        }
        y += secGap;
      }
    }

    // ── 푸터 ──
    txt("—  스쿠에니 유루스마지  —", W/2, H - 64,
      { align:"center", color: palette.inkMute, font: 'italic 400 18px "Cormorant Garamond", serif' });
    const datestr = new Date().toLocaleDateString("ko-KR", {year:"numeric",month:"2-digit",day:"2-digit"});
    txt("Made by " + MADE_BY + "   ·   " + SITE_URL + "   ·   " + datestr,
      W/2, H - 36,
      { align:"center", color: palette.inkSoft, font: '500 14px "JetBrains Mono", monospace' });

    const a = document.createElement("a");
    a.download = "ff_progress_" + new Date().toISOString().split("T")[0] + ".png";
    a.href = cv.toDataURL("image/png");
    document.body.appendChild(a);
    a.click();
    setTimeout(() => document.body.removeChild(a), 100);
    } catch(e) { console.error("Export error:", e); }
    finally { setSaving(false); }
  }, [played, subtitle, playedCount, pct, twitterId]);

  return (
    <React.Fragment>
      <div className="wrap">
        <div className="hdr">
          <div className="hdr-inner">
            <div className="hdr-left">
              <div className="eyebrow">
                <span className="dot"></span>
                <span>Final Fantasy Progress Checker</span>
              </div>
            </div>
            <h1 className="ttl">
              FINAL FANTASY <span className="amp">진도</span>
            </h1>
            <div className="hdr-right">
              <div className="eyebrow">
                <span>{SERIES.length} Series</span>
                <span>·</span>
                <span>{TOTAL_GAMES} Titles</span>
                <span className="dot"></span>
              </div>
            </div>
          </div>

          {editingSub ? (
            <div className="sub"><span className="orn">❖</span><input autoFocus value={subtitle} onChange={e=>setSubtitle(e.target.value)} onBlur={saveSub} onKeyDown={e=>e.key==="Enter"&&saveSub()} /><span className="orn">❖</span></div>
          ) : (
            <div className="sub" onClick={()=>setEditingSub(true)} title="클릭하여 수정">
              <span className="orn">❖</span>{subtitle}<span className="orn">❖</span>
            </div>
          )}

          {twitterId.trim() && (
            <div className="twt-line">@{twitterId.trim()}</div>
          )}

          <div className="progress-card">
            <div className="seal">
              <div className="seal-star"></div>
              <div className="seal-pct">{pct}%</div>
              <div className="seal-lbl">Sealed</div>
            </div>
            <div className="pbar-col">
              <div className="pbar-top">
                <span>진행도 — PROGRESS</span>
                <span><span className="pct">{playedCount}</span> <span style={{color:"var(--ink-mute)"}}>/ {TOTAL_GAMES}</span></span>
              </div>
              <div className="pbar"><div className="pfill" style={{width:pct+"%"}} /></div>
              <div className="pbar-ticks">
                <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
              </div>
            </div>
            <div className="stat-big">
              <div>
                <div style={{display:"flex",alignItems:"baseline",gap:0}}>
                  <span className="n">{playedCount}</span>
                  <span className="sep">/</span>
                  <span className="d">{TOTAL_GAMES}</span>
                </div>
                <div className="stat-label">Titles Conquered</div>
              </div>
            </div>
          </div>

          <div className="actions">
            <div className="twt">
              <div className="twt-at">@</div>
              <input placeholder="트위터 아이디 (선택)" value={twitterId} onChange={e=>setTwitterId(e.target.value)} />
            </div>
            <button className="btn btn-primary" onClick={exportImage} disabled={saving}>
              {saving ? "내보내는 중..." : "이미지 내보내기"}
            </button>
            <button className="btn" onClick={copyUrl}>
              {copied ? "✓ 복사됨" : "링크 복사"}
            </button>
            <button className="btn btn-danger" onClick={()=>{ if(confirm("전체 기록을 초기화할까요?")) setPlayed({}); }}>초기화</button>
          </div>
        </div>

        <div className="grid">
          {COLS.map(c => (
            <div key={c}>
              {SERIES.filter(s=>s.col===c).map(s => {
                const doneN = s.games.filter(g=>played[g.id]).length;
                const allDone = doneN === s.games.length;
                const clr = LC[s.id] || "#666";
                const hasLogo = true && logoLoaded[s.id];
                const useNum = true && s.num;
                return (
                  <div key={s.id} className={"ser" + (allDone ? " done" : "")} style={{"--ser-c": clr}}>
                    <div className="ser-head" onClick={()=>toggleSeries(s)} title="시리즈 전체 토글">
                      {hasLogo ? (
                        <img className="logo-img" src={LOGO_DIR+s.id+LOGO_EXT} alt={s.title} draggable="false" style={{gridColumn:"1 / -1", maxHeight:56}} />
                      ) : (
                        <React.Fragment>
                          <div className={"ser-num" + (useNum ? "" : " small")}>
                            {useNum ? s.num : (s.numText || "FF")}
                          </div>
                          <div className="ser-meta">
                            <div className="ser-title">{s.title}</div>
                            <div className="ser-sub">
                              {true && s.year && <span className="ser-year">{s.year}</span>}
                              {true && s.year && <span>·</span>}
                              <span className="ser-count"><b>{doneN}</b>/{s.games.length}</span>
                              {allDone && <span className="ser-seal-mark">SEALED</span>}
                            </div>
                          </div>
                        </React.Fragment>
                      )}
                    </div>
                    <div className="ser-gauge">
                      <div className="ser-gauge-fill" style={{width: (s.games.length ? (doneN/s.games.length)*100 : 0) + "%"}} />
                    </div>
                    <div className="games">
                      {s.games.map((g, idx) => {
                        const on = !!played[g.id];
                        return (
                          <div key={g.id} className="gi" onClick={()=>toggle(g.id)}>
                            <span className="gi-num">{String(idx+1).padStart(2,'0')}</span>
                            <div className={"cb"+(on?" on":"")}>
                              {on && <svg viewBox="0 0 10 10" fill="none" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1.5 5.5 L4 8 L8.5 2" /></svg>}
                            </div>
                            <span className={"gn"+(on?" on":"")}>{g.name}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>

        <div className="ft">
          <span className="orn">❖</span>
          스쿠에니 유루스마지
          <span className="orn">❖</span>
        </div>
      </div>

      
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
